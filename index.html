<style>
:root{--ink:#44204f;--pink:#ff67bd;--purple:#a75cff;--soft:#fff1fb;--glass:rgba(255,255,255,.58);--line:rgba(134,52,148,.22);--good:#64d7a8;--warn:#ffd45f;--bad:#ff6b91;--shadow:0 18px 42px rgba(77,35,91,.2);font-family:"Trebuchet MS","Arial Rounded MT Bold",Arial,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:#ffd6ef;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:-2;background:var(--bg);background-size:cover;transition:background .4s ease}body:after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 15% 15%,rgba(255,255,255,.5),transparent 22%),radial-gradient(circle at 78% 18%,rgba(255,110,196,.32),transparent 25%),linear-gradient(120deg,rgba(255,217,244,.35),rgba(199,178,255,.38));pointer-events:none}.theme0{--bg:linear-gradient(135deg,#fed3f1,#c9b5ff 55%,#fff0fb)}.theme1{--bg:linear-gradient(135deg,#d6f2ff,#f9dbff 48%,#fff3fb)}.theme2{--bg:linear-gradient(135deg,#ffe1ec,#ffc3df 48%,#cbb8ff)}.theme3{--bg:linear-gradient(135deg,#ffd3fa,#ffaad6 42%,#bca5ff)}.theme4{--bg:linear-gradient(135deg,#fff0bf,#ffd2eb 48%,#d4c3ff)}.theme5{--bg:linear-gradient(135deg,#bde9ff,#ffd7f2 48%,#f7c2ff)}.theme6{--bg:linear-gradient(135deg,#f3c2ff,#ffb5de 48%,#fff0fc)}.theme7{--bg:linear-gradient(135deg,#ffecf7,#c9bcff 48%,#ffbedf)}.theme8{--bg:linear-gradient(135deg,#e0ccff,#ffd1ec 48%,#b9efff)}.theme9{--bg:linear-gradient(135deg,#ffcae8,#ffc9f6 48%,#d4bbff)}.theme10{--bg:linear-gradient(135deg,#ffe9a9,#ffb7de 48%,#c8b4ff)}.theme11{--bg:linear-gradient(135deg,#c9f1ff,#ffcae8 48%,#f1c6ff)}.theme12{--bg:linear-gradient(135deg,#f6d0ff,#ffbcd9 48%,#fff5d8)}.theme13{--bg:linear-gradient(135deg,#ffd7ea,#d6bdff 48%,#bceeff)}.theme14{--bg:linear-gradient(135deg,#ffc4ee,#ffe4fa 48%,#bba9ff)}.theme15{--bg:linear-gradient(135deg,#fbd2ff,#ffb2d1 48%,#fceeb6)}
.bg-art{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.62}.shape{position:absolute;filter:drop-shadow(0 8px 18px rgba(94,35,108,.15))}.castle{left:4%;bottom:5%;width:190px;height:160px;background:linear-gradient(#fff8,#fff5);clip-path:polygon(8% 100%,8% 36%,20% 36%,20% 18%,28% 18%,28% 36%,42% 36%,42% 10%,50% 0,58% 10%,58% 36%,72% 36%,72% 18%,80% 18%,80% 36%,92% 36%,92% 100%)}.balloon{right:6%;top:13%;width:110px;height:140px;border-radius:52% 52% 48% 48%;background:radial-gradient(circle at 35% 28%,#fff8,transparent 22%),linear-gradient(135deg,#ff67bd,#a75cff)}.music{right:12%;bottom:12%;font-size:100px;color:#fff8;font-weight:900}.spark{left:44%;top:9%;font-size:85px;color:#fff7}.app{width:min(1440px,calc(100% - 22px));margin:auto;padding:14px 0 24px}header{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;margin-bottom:12px}.brand h1{margin:0;font-size:clamp(1.8rem,4vw,3.6rem);line-height:.9}.brand p{margin:5px 0 0;font-weight:900;color:#67336f}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab,.btn{border:0;border-radius:999px;background:rgba(255,255,255,.62);color:var(--ink);font-weight:1000;box-shadow:0 8px 22px rgba(77,35,91,.13);min-height:44px;padding:0 16px;cursor:pointer}.tab.active{background:linear-gradient(135deg,#ff67bd,#a75cff);color:white}.date{font-weight:1000;background:rgba(255,255,255,.55);padding:12px 16px;border-radius:999px;box-shadow:0 8px 22px rgba(77,35,91,.13)}.page{display:grid;grid-template-columns:2fr 1fr;gap:12px;min-height:calc(100vh - 118px)}.main,.side{display:grid;gap:12px}.main{grid-template-rows:auto 1fr auto}.bubble{background:var(--glass);border:1px solid rgba(255,255,255,.5);backdrop-filter:blur(8px);border-radius:24px;box-shadow:var(--shadow);padding:14px}.bubble h2,.bubble h3{margin:0 0 10px}.kid-title{display:flex;align-items:center;gap:12px}.starbadge{width:74px;height:74px;display:grid;place-items:center;color:#fff;font-size:1.8rem;font-weight:1000;text-shadow:0 2px 5px #7b2e79;background:linear-gradient(135deg,#ff67bd,#a75cff);clip-path:polygon(50% 0,61% 34%,98% 35%,68% 56%,79% 91%,50% 70%,21% 91%,32% 56%,2% 35%,39% 34%)}.points{display:grid;grid-template-columns:160px 1fr 130px;gap:14px;align-items:center}.score{font-size:3.4rem;font-weight:1000;color:#d7198c;line-height:1}.score small{display:block;font-size:.85rem;color:#6c3a72}.meter{height:42px;border-radius:999px;background:rgba(255,255,255,.48);border:2px solid rgba(255,103,189,.35);position:relative;overflow:hidden}.meter-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff67bd,#ffc4ee,#a75cff);border-radius:999px;transition:.25s}.ticks{position:absolute;inset:0;display:grid;grid-template-columns:repeat(10,1fr);pointer-events:none}.ticks span{border-left:1px solid rgba(99,36,112,.22)}.reward-chip{text-align:center;font-weight:1000;background:#fff5;padding:12px;border-radius:18px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.action{min-height:142px;border-radius:22px;border:3px solid rgba(255,255,255,.3);background:rgba(255,255,255,.36);padding:12px;display:grid;grid-template-rows:auto 1fr auto;gap:8px}.action.active{border-color:#ffd45f;background:rgba(255,246,190,.45)}.action.done{border-color:#64d7a8;background:rgba(207,255,232,.52)}.action.bad{background:rgba(255,214,225,.45)}.action h4{font-size:1.25rem;margin:0}.checks{display:flex;gap:8px;flex-wrap:wrap}.mini-check{display:flex;align-items:center;gap:6px;border:0;border-radius:999px;padding:8px 10px;background:#fff8;font-weight:1000;cursor:pointer}.mini-check.on{background:linear-gradient(135deg,#ff67bd,#a75cff);color:#fff}.task-list{display:grid;gap:8px}.task{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;min-height:52px;border:2px solid var(--line);border-radius:18px;background:rgba(255,255,255,.38);padding:7px 10px;cursor:pointer;font-weight:1000}.task.done{background:rgba(207,255,232,.6);border-color:#64d7a8}.box{width:34px;height:34px;border-radius:12px;background:#fff9;border:3px solid rgba(167,92,255,.28);display:grid;place-items:center;color:transparent}.task.done .box{background:#64d7a8;color:#51225c}.timer{font-variant-numeric:tabular-nums;color:#d7198c}.side{grid-template-rows:1fr 2fr}.morning{min-height:0}.night{min-height:0}.rewards-page{display:none}.rewards-page.active{display:grid}.reward-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.reward-card{text-align:center}.reward-card .big{font-size:5rem;color:#d7198c;font-weight:1000}.keypad-backdrop{position:fixed;inset:0;z-index:20;background:rgba(69,24,80,.45);display:none;place-items:center}.keypad{width:min(360px,calc(100% - 24px));background:rgba(255,246,252,.96);border-radius:28px;padding:18px;box-shadow:0 24px 70px rgba(48,15,60,.35);text-align:center}.pin-display{height:48px;border-radius:16px;background:#fff;margin:10px 0 14px;display:grid;place-items:center;font-size:2rem;letter-spacing:.3em;color:#d7198c;font-weight:1000}.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.key{height:62px;border:0;border-radius:18px;background:linear-gradient(135deg,#fff,#ffd8ef);font-size:1.5rem;font-weight:1000;color:#64266d;box-shadow:0 6px 14px rgba(83,35,96,.12)}canvas{position:fixed;inset:0;z-index:15;pointer-events:none}.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,120px);z-index:25;background:#fff;padding:14px 18px;border-radius:18px;box-shadow:var(--shadow);font-weight:1000;transition:.25s}.toast.show{transform:translate(-50%,0)}@media(max-width:980px){.page{grid-template-columns:1fr}.side{grid-template-rows:auto auto}.points{grid-template-columns:1fr}.grid,.reward-grid{grid-template-columns:1fr}header{grid-template-columns:1fr}.date{width:max-content}}
</style>
</head>
<body>
<div class="bg-art"><div class="shape castle"></div><div class="shape balloon"></div><div class="shape music">♪</div><div class="shape spark">✦</div></div><canvas id="fireworks"></canvas>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<main class="app"><header><div class="brand"><h1>Bedtime Stars</h1><p>Good choices, jobs, rewards and resets every day</p></div><nav class="tabs" id="tabs"></nav><div class="date" id="dateLabel"></div></header><section id="view"></section></main>
<div class="keypad-backdrop" id="pad"><div class="keypad"><h2>Parent Code</h2><p id="padText">Enter code to approve</p><div class="pin-display" id="pinBox"></div><div class="keys" id="keys"></div></div></div><div class="toast" id="toast"></div>
<script>
const SUPABASE_URL="https://kngywlqlutfjnrxyovkn.supabase.co",SUPABASE_KEY="sb_publishable_Hig0nsloGtkPbisvKO1Stg_YzidkhkP",db=window.supabase?window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY):null;
const PIN="6168",kids=["Kenzi","Halle","Zalee"],morning=["Eat breakfast","Brush teeth","Toilet","Get dressed"],night=["Dinner","Shower","Final snack","Quiet time","Teeth and toilet","Bed"],good=["Tidy room","Put washing away","Clean kids area","Clean house"],bad=["Be naughty","Be rude","Fight with sister"],fireNight=new Set(["Dinner","Shower","Teeth and toilet","Bed"]);let activeKid=localStorage.activeKid||kids[0],date=today(),rows={},pin="",pinResolve=null,channel=null,loading=false,timerLoops=[];
const view=document.getElementById("view"),tabs=document.getElementById("tabs"),dateLabel=document.getElementById("dateLabel"),toast=document.getElementById("toast"),pad=document.getElementById("pad"),pinBox=document.getElementById("pinBox"),keys=document.getElementById("keys"),canvas=document.getElementById("fireworks"),ctx=canvas.getContext("2d"),particles=[];let raf=0;
function today(){const d=new Date;return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}function pretty(d){let p=d.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"})}function id(k,t){return date+"|"+k+"|"+t}function get(k,t){return !!rows[id(k,t)]?.done}function setLocal(k,t,done,extra={}){rows[id(k,t)]={id:id(k,t),day:date,child:k,task:t,done:!!done,quiet_timer_ends_at:extra.quiet_timer_ends_at||null,updated_at:new Date().toISOString()}}async function saveRow(k,t,done,extra={}){setLocal(k,t,done,extra);render();if(db&&!loading)await db.from("bedtime_tasks").upsert(rows[id(k,t)])}function show(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1800)}function pointsFor(k){let total=0;Object.values(rows).forEach(r=>{if(r.child!==k||!r.done)return;if(r.task==="POINT:morning"||r.task==="POINT:bed"||r.task.startsWith("GOOD:"))total+=10;if(r.task.startsWith("BAD:"))total-=10});return total}function rewardPts(k){return Math.max(0,Math.floor(pointsFor(k)/100))}function cycleTheme(){document.body.className="theme"+(date.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%16)}
function renderTabs(){tabs.innerHTML=kids.map(k=>`<button class="tab ${k===activeKid?'active':''}" onclick="activeKid='${k}';localStorage.activeKid=activeKid;render()">${k}</button>`).join("")+`<button class="tab ${activeKid==='Rewards'?'active':''}" onclick="activeKid='Rewards';render()">Rewards</button>`}
function render(){if(date!==today()){date=today();rows={};loadRemote()}cycleTheme();dateLabel.textContent=pretty(date);renderTabs();if(activeKid==='Rewards')return renderRewards();let k=activeKid,total=pointsFor(k),pct=Math.max(0,Math.min(100,total%100));if(total<0)pct=0;view.className="page";view.innerHTML=`<section class="main"><div class="bubble kid-title"><div class="starbadge">${k[0]}</div><div><h2>${k}'s points</h2><p>Every 100 points becomes 1 reward point.</p></div></div><div class="bubble"><div class="points"><div class="score">${total}<small>points</small></div><div class="meter"><div class="meter-fill" style="width:${pct}%"></div><div class="ticks">${'<span></span>'.repeat(10)}</div></div><div class="reward-chip">${rewardPts(k)} reward<br>point${rewardPts(k)==1?'':'s'}</div></div></div><div class="bubble"><h3>Do something good</h3><div class="grid">${good.map(t=>actionCard(k,t,'good')).join("")}</div></div><div class="bubble"><h3>Naughty box</h3><div class="grid">${bad.map(t=>badCard(k,t)).join("")}</div></div></section><aside class="side"><div class="bubble morning"><h3>Morning tasks</h3><div class="task-list">${morning.map(t=>taskRow(k,'M:'+t,t)).join("")}</div></div><div class="bubble night"><h3>Night tasks</h3><div class="task-list">${night.map(t=>nightRow(k,t)).join("")}</div></div></aside>`;attachTimers(k);}
function actionCard(k,t){let child=get(k,"GOOD_CHILD:"+t),parent=get(k,"GOOD:"+t),on=child||parent;return `<div class="action ${on?'active':''} ${parent?'done':''}"><h4>${t}</h4><p>${parent?'Approved: +10 points':child?'Waiting for Mum or Dad':'Tap child box, then parent approval'}</p><div class="checks"><button class="mini-check ${child?'on':''}" onclick="toggleGoodChild('${k}','${t}')">Cool box</button><button class="mini-check ${parent?'on':''}" onclick="approveGood('${k}','${t}')">Mum & Dad</button></div></div>`}
function badCard(k,t){let done=get(k,"BAD:"+t);return `<div class="action bad ${done?'done':''}"><h4>${t}</h4><p>${done?'Minus 10 points today':'Needs parent code'}</p><button class="mini-check ${done?'on':''}" onclick="approveBad('${k}','${t}')">Apply -10</button></div>`}
function taskRow(k,key,label){let done=get(k,key);return `<div class="task ${done?'done':''}" onclick="toggleTask('${k}','${key}','${label}')"><div class="box">✓</div><div>${label}</div><div></div></div>`}
function nightRow(k,t){let key='N:'+t,done=get(k,key),r=rows[id(k,key)],timer='';if(t==='Quiet time'||t==='Bed'){let end=Number(r?.quiet_timer_ends_at||0);if(end>Date.now()&&!done)timer=`<span class="timer" data-end="${end}"></span>`}return `<div class="task ${done?'done':''}" onclick="toggleNight('${k}','${t}')"><div class="box">✓</div><div>${t}</div><div>${timer}</div></div>`}
async function toggleTask(k,key,label){await saveRow(k,key,!get(k,key));if(morning.every(t=>get(k,'M:'+t))&&!get(k,'POINT:morning')){await saveRow(k,'POINT:morning',true);mega();show(k+' earned 10 morning points!')}}async function toggleNight(k,t){let key='N:'+t;if(t==='Quiet time'){if(get(k,key))return;await saveRow(k,key,false,{quiet_timer_ends_at:Date.now()+10*60*1000});show(k+' quiet time started.');return}if(t==='Bed'){await saveRow(k,key,true,{quiet_timer_ends_at:Date.now()+30*1000});if(!get(k,'POINT:bed'))await saveRow(k,'POINT:bed',true);mega();show(k+' earned 10 bedtime points!');return}await saveRow(k,key,!get(k,key));if(fireNight.has(t)&&get(k,key))mega()}async function toggleGoodChild(k,t){await saveRow(k,'GOOD_CHILD:'+t,!get(k,'GOOD_CHILD:'+t))}async function approveGood(k,t){if(get(k,'GOOD:'+t))return;let ok=await askPin('Approve +10 for '+t+'?');if(ok){await saveRow(k,'GOOD_CHILD:'+t,true);await saveRow(k,'GOOD:'+t,true);mega();show(k+' earned 10 points!')}}async function approveBad(k,t){if(get(k,'BAD:'+t))return;let ok=await askPin('Apply -10 for '+t+'?');if(ok){await saveRow(k,'BAD:'+t,true);show(k+' lost 10 points.')}}function renderRewards(){view.className='rewards-page active';view.innerHTML=`<div class="bubble"><h2>Reward points</h2><p>Each girl gets 1 reward point for every 100 points earned.</p></div><div class="reward-grid">${kids.map(k=>`<div class="bubble reward-card"><div class="starbadge" style="margin:auto">${k[0]}</div><h2>${k}</h2><div class="big">${rewardPts(k)}</div><p>${pointsFor(k)} total points</p></div>`).join("")}</div>`}
function attachTimers(k){timerLoops.forEach(clearInterval);timerLoops=[];document.querySelectorAll('[data-end]').forEach(el=>{let end=Number(el.dataset.end);let tick=()=>{let s=Math.max(0,Math.ceil((end-Date.now())/1000)),m=Math.floor(s/60);el.textContent=m+':'+String(s%60).padStart(2,'0');if(s<=0)finishTimers()};tick();timerLoops.push(setInterval(tick,1000))})}async function finishTimers(){for(const k of kids){let q=rows[id(k,'N:Quiet time')];if(q&&!q.done&&Number(q.quiet_timer_ends_at)<=Date.now())await saveRow(k,'N:Quiet time',true,{quiet_timer_ends_at:null});let b=rows[id(k,'N:Bed')];if(b&&b.done&&Number(b.quiet_timer_ends_at)<=Date.now())setLocal(k,'N:Bed',true,{quiet_timer_ends_at:null})}render()}setInterval(finishTimers,1000);
function askPin(text){document.getElementById('padText').textContent=text;pin='';pinBox.textContent='';pad.style.display='grid';return new Promise(res=>pinResolve=res)}keys.innerHTML=[1,2,3,4,5,6,7,8,9,'Clear',0,'Cancel'].map(x=>`<button class="key" onclick="pressKey('${x}')">${x}</button>`).join('');function pressKey(x){if(x==='Cancel'){pad.style.display='none';pinResolve(false);return}if(x==='Clear'){pin='';pinBox.textContent='';return}pin+=x;pinBox.textContent='*'.repeat(pin.length);if(pin.length>=4){let ok=pin===PIN;pad.style.display='none';if(!ok)show('Wrong code');pinResolve(ok)}}
async function loadRemote(){if(!db)return;loading=true;try{let res=await db.from('bedtime_tasks').select('*');if(!res.error){rows={};(res.data||[]).forEach(r=>rows[r.id]=r);render()}}finally{loading=false}}function realtime(){if(!db||channel)return;channel=db.channel('stars_rewards_live').on('postgres_changes',{event:'*',schema:'public',table:'bedtime_tasks'},()=>loadRemote()).subscribe()}function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',resize);resize();
function mega(){burst(innerWidth/2,innerHeight*.38,160);setTimeout(()=>burst(innerWidth*.35,innerHeight*.48,90),140);setTimeout(()=>burst(innerWidth*.65,innerHeight*.48,90),260)}function burst(x,y,n){let c=['#ff67bd','#ffc4ee','#a75cff','#fff','#ffd45f'];for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=3+Math.random()*9;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,size:4+Math.random()*8,life:70+Math.random()*40,color:c[Math.floor(Math.random()*c.length)],spin:Math.random()*6})}if(!raf)anim()}function star(x,y,o,i,p){ctx.beginPath();for(let n=0;n<p*2;n++){let r=n%2?i:o,a=-Math.PI/2+n*Math.PI/p,px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;n?ctx.lineTo(px,py):ctx.moveTo(px,py)}ctx.closePath()}function anim(){raf=requestAnimationFrame(anim);ctx.clearRect(0,0,innerWidth,innerHeight);for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.vx*=.985;p.spin+=.16;ctx.save();ctx.globalAlpha=Math.max(p.life/100,0);ctx.translate(p.x,p.y);ctx.rotate(p.spin);ctx.fillStyle=p.color;star(0,0,p.size,p.size*.45,5);ctx.fill();ctx.restore();if(p.life<=0)particles.splice(i,1)}if(!particles.length){cancelAnimationFrame(raf);raf=0}}render();loadRemote();realtime();setInterval(()=>{if(date!==today()){date=today();rows={};loadRemote();render()}},30000);
</script>
